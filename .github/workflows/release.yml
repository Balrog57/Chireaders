name: Build Android APK

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Prebuild (Generate Android Native Code)
        run: npx expo prebuild --platform android --no-install

      - name: Build APK (Release)
        env:
          KEYSTORE_PASS: ${{ secrets.KEYSTORE_PASSWORD }}
        run: |
          cd android
          # Use secret if available, otherwise generate a random temp password
          if [ -n "$KEYSTORE_PASS" ]; then
            PASS="$KEYSTORE_PASS"
          else
            PASS=$(openssl rand -base64 32)
          fi
          # Generate a temporary keystore for signing
          keytool -genkeypair -v -keystore my-release-key.keystore -alias my-key-alias -keyalg RSA -keysize 2048 -validity 10000 -storepass "$PASS" -keypass "$PASS" -dname "CN=ChiReaders, OU=App, O=Org, L=City, S=State, C=US"
          # Build Release APK with signing config passed via command line properties
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=$(pwd)/my-release-key.keystore \
            -Pandroid.injected.signing.store.password="$PASS" \
            -Pandroid.injected.signing.key.alias=my-key-alias \
            -Pandroid.injected.signing.key.password="$PASS"

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: android/app/build/outputs/apk/release/app-release.apk

      - name: Create Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: android/app/build/outputs/apk/release/app-release.apk
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
